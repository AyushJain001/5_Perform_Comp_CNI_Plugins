apiVersion: apps/v1
kind: Deployment
metadata:
  name: g5-echo
  namespace: g5-bench
spec:
  replicas: 3
  selector:
    matchLabels:
      app: g5-echo
  template:
    metadata:
      labels:
        app: g5-echo
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo:1.0.0
        args:
        - "-text=hello-from-g5"
        - "-listen=:5678"
        ports:
        - containerPort: 5678
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: g5-echo
  namespace: g5-bench
spec:
  selector:
    app: g5-echo
  ports:
  - port: 5678
    targetPort: 5678
    protocol: TCP
