apiVersion: apps/v1
kind: Deployment
metadata:
  name: g5-client
  namespace: g5-bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: g5-client
  template:
    metadata:
      labels:
        app: g5-client
    spec:
      containers:
      - name: fortio
        image: fortio/fortio:1.67.0
        command: ["fortio", "server", "-http-port", "8080"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
